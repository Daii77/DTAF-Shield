<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTAF Shield — {% block title %}Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dashboard-body">

    <div class="ambient-bg">
        <div class="ambient-orb orb-1"></div>
        <div class="ambient-orb orb-2"></div>
        <div class="ambient-orb orb-3"></div>
    </div>

    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon"><i class="bi bi-shield-lock-fill"></i></div>
            <div class="brand-text">
                <span class="brand-name">DTAF</span>
                <span class="brand-sub">Shield</span>
            </div>
        </div>

        <div class="sidebar-section-label">Navigation</div>
        <ul class="sidebar-nav">
            <li class="{% if request.path == '/dashboard' %}active{% endif %}">
                <a href="/dashboard">
                    <span class="nav-icon"><i class="bi bi-grid-1x2-fill"></i></span>
                    <span class="nav-label">Dashboard</span>
                </a>
            </li>
            <li class="{% if request.path == '/workspace' %}active{% endif %}">
                <a href="/workspace">
                    <span class="nav-icon"><i class="bi bi-diagram-3-fill"></i></span>
                    <span class="nav-label">Workspace</span>
                    <span class="nav-badge">LIVE</span>
                </a>
            </li>
            <li class="{% if request.path == '/simulation' %}active{% endif %}">
                <a href="/simulation">
                    <span class="nav-icon"><i class="bi bi-play-circle-fill"></i></span>
                    <span class="nav-label">Simulation</span>
                </a>
            </li>
            <li class="{% if request.path == '/results' %}active{% endif %}">
                <a href="/results">
                    <span class="nav-icon"><i class="bi bi-bar-chart-fill"></i></span>
                    <span class="nav-label">Analytics</span>
                </a>
            </li>
            <li class="{% if request.path == '/compare' %}active{% endif %}">
                <a href="/compare">
                    <span class="nav-icon"><i class="bi bi-layers-fill"></i></span>
                    <span class="nav-label">Compare</span>
                </a>
            </li>
        </ul>

        <div class="sidebar-section-label">System</div>
        <div class="sidebar-status">
            <div class="status-indicator online"></div>
            <span>DTAF Engine Active</span>
        </div>

        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar">{{ session.username[0].upper() }}</div>
                <div class="user-details">
                    <span class="user-name">{{ session.username }}</span>
                    <span class="user-role">Administrator</span>
                </div>
            </div>
            <a href="/logout" class="logout-btn" title="Logout"><i class="bi bi-box-arrow-right"></i></a>
        </div>
    </nav>

    <!-- Main -->
    <main id="content">
        <header class="top-bar">
            <button id="sidebarToggle" class="sidebar-toggle"><i class="bi bi-list"></i></button>
            <div class="top-bar-right">
                <div class="top-badge"><i class="bi bi-cpu-fill text-primary me-1"></i><span>NS2 Engine v2.4</span></div>
                <div class="top-badge"><i class="bi bi-shield-check text-success me-1"></i><span>DTAF Active</span></div>
            </div>
        </header>
        <div class="page-content">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
